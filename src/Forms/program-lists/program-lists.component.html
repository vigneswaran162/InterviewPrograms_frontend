<div class="container-fluid">
    <div class="row d-flex justify-content-center" >
         
        <div class="col-md-12">
            <div class="row">
                <div class="col-md-12 mb-3 p-2 d-flex justify-content-between align-items-center">
                     <div class="heading"><h5>Program <span>Lists</span></h5></div>
                     <div>
                        <select class="form-select" aria-label="Default select example" >
                        <option selected>Open this select menu</option>
                        <option value="javascript">javascript</option>
                        <option value="angular">angular</option>
                        <option value="interview">interview</option>
                    </select>
                     </div>
                </div>
            </div>
        </div>
         
        <div class="col-md-12" style="max-height: 85vh; overflow-y: auto;">
            <div class="row">
                         @for (item of DataSource; track item) {
        <div class="col-md-12 card p-4 mb-3 border-0 shadow " style="border-radius: 10px;">
           <h5>{{item.Title}}</h5>
             <div [innerHTML]="item.Input" class="input-box">

            </div>
             <div [innerHTML]="item.Output" class="output-box">

            </div>
            <div [innerHTML]="item.Program" class="program">

            </div>
        </div>
    }
            </div>
        </div>
   
    </div>
</div>


<div class="loader-wrapper" *ngIf="isLoading">
  
<div class="spinner">
  <div></div>   
  <div></div>    
  <div></div>    
  <div></div>    
  <div></div>    
  <div></div>    
  <div></div>    
  <div></div>    
  <div></div>    
  <div></div>    
</div>
</div>
